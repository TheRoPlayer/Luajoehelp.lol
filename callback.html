<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing you in...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:#07111f; color:#fff; font-family:Inter,system-ui,sans-serif; }
    .card { width:min(560px, calc(100% - 32px)); padding:28px; border-radius:24px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); }
    p { color:#b7c1dc; line-height:1.7; }
    .spinner { width:42px; height:42px; border-radius:50%; border:4px solid rgba(255,255,255,0.12); border-top-color:#7b84ff; animation:spin 0.9s linear infinite; margin-bottom:18px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    code { background:rgba(255,255,255,0.07); padding:2px 7px; border-radius:8px; }
    a { color:#9dcfff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Completing Discord sign-in...</h1>
    <p id="status">Please wait while we verify your login.</p>
  </div>

  <script src="config.js"></script>
  <script>
    (async function () {
      const status = document.getElementById('status');
      const config = window.APP_CONFIG || {};
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state');
      const storedState = sessionStorage.getItem('discord_oauth_state');

      if (!code) {
        status.innerHTML = 'No OAuth code was found in the URL. Check your Discord app redirect URI.';
        return;
      }

      if (!state || !storedState || state !== storedState) {
        status.innerHTML = 'State check failed. This login attempt was rejected for safety.';
        return;
      }

      if (!config.backendExchangeUrl || config.backendExchangeUrl.includes('localhost:3000') === false && config.backendExchangeUrl.startsWith('http') === false) {
        status.innerHTML = 'Set <code>backendExchangeUrl</code> inside <code>config.js</code> so your server can exchange the code securely.';
        return;
      }

      try {
        const response = await fetch(config.backendExchangeUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, redirectUri: config.redirectUri })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Discord login failed.');
        }

        localStorage.setItem('session_user', JSON.stringify(data.user || null));
        localStorage.setItem('session_access', data.access_token || '');
        status.innerHTML = 'Login complete. Your backend returned user data successfully. You can now redirect this page to your future dashboard.';
      } catch (error) {
        status.textContent = error.message || 'Unexpected login error.';
      }
    })();
  </script>
</body>
</html>
